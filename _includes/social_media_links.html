{% if site.data.social-media %}
<div id="social-media">
    {% assign sm = site.data.social-media %}
    {% for entry in site.data.social-media %}
    {% assign key = entry | first %}
        {% if sm[key].id %}
            <a href="{{ sm[key].href }}{{ sm[key].id }}" title="{{ sm[key].title }}" rel="me" style="margin: 1%;"><i class="fa {{ sm[key].fa-icon }} fa-lg"></i></a>
    {% endif %}
    {% endfor %}
</div>
{% endif %}
